name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string
      - name: Load Vite environment variables
        run: |
          echo "${{ secrets.INVENTORY_DEPLOYMENT_APP }}" >> $GITHUB_ENV
      - name: Verify build variables
        run: |
          if [ -z "$VITE_TENANT_ID" ]; then
            echo "::error::VITE_TENANT_ID is empty"
            exit 1
          fi
          if [ -z "$VITE_CLIENT_ID" ]; then
            echo "::error::VITE_CLIENT_ID is empty"
            exit 1
          fi
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL is empty"
            exit 1
          fi
          echo "Build variables verified"
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_ROCK_09F33EF0F }}
          action: "upload"
          app_location: "/"
          api_location: "api"
          output_location: "dist"
          github_id_token: ${{ steps.idtoken.outputs.result }}
        env:
          VITE_TENANT_ID: ${{ env.VITE_TENANT_ID }}
          VITE_CLIENT_ID: ${{ env.VITE_CLIENT_ID }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
